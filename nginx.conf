server {
    listen 80;
    server_name _;

    # Statik fayllar hajmini oshirish (shapefile GeoJSON, mineralizatsiya rasmlari)
    client_max_body_size 50M;

    # React SPA — barcha sahifa yo'llari index.html'ga
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }

    # Django'ga yo'naltiriladigan yo'llar.
    # DIQQAT: 'admin' shu ro'yxatda BO'LISHI SHART, aks holda /admin/ so'rovi
    # React SPA'ga tushib, admin panel ochilmaydi.
    location ~ ^/(admin|api|seismos|magnitka|anomaly|informativlik|catalog-list|upload|media|static)/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}
